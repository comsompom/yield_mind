<!DOCTYPE html>
<html lang="en" class="{% block html_class %}{% endblock %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}YieldMind{% endblock %} — AI-Powered Yield on Initia</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css', v='20260317o') }}">
</head>
<body class="{% block body_class %}{% endblock %}">
  <header class="header">
    <a href="{{ url_for('web.index') }}" class="logo">YieldMind</a>
    <nav class="top-nav">
      <a href="{{ url_for('web.index') }}" class="nav-link{% if request.endpoint == 'web.index' %} is-active{% endif %}" {% if request.endpoint == 'web.index' %}aria-current="page"{% endif %}>Home</a>
      <a href="{{ url_for('web.dashboard') }}" class="nav-link{% if request.endpoint == 'web.dashboard' %} is-active{% endif %}" {% if request.endpoint == 'web.dashboard' %}aria-current="page"{% endif %}>Dashboard</a>
      <a href="{{ url_for('web.operations') }}" class="nav-link{% if request.endpoint == 'web.operations' %} is-active{% endif %}" {% if request.endpoint == 'web.operations' %}aria-current="page"{% endif %}>Operations</a>
      <a href="{{ url_for('web.recommendations') }}" class="nav-link{% if request.endpoint == 'web.recommendations' %} is-active{% endif %}" {% if request.endpoint == 'web.recommendations' %}aria-current="page"{% endif %}>AI Recommendations</a>
      <a href="{{ url_for('web.how_to_use') }}" class="nav-link{% if request.endpoint == 'web.how_to_use' %} is-active{% endif %}" {% if request.endpoint == 'web.how_to_use' %}aria-current="page"{% endif %}>How to use</a>
    </nav>
    <div id="wallet-bar" class="wallet-bar">
      <!-- InterwovenKit wallet connect: connect button, address, .init name -->
      <div id="wallet-placeholder">
        <span class="wallet-hint">Connect wallet to use YieldMind</span>
        <button type="button" id="btn-connect" class="btn btn-primary">Connect Wallet</button>
      </div>
      <div id="wallet-connected" class="hidden">
        <span id="wallet-address" class="wallet-address"></span>
        <span id="wallet-init-name" class="wallet-init"></span>
        <button type="button" id="btn-disconnect" class="btn btn-outline">Disconnect</button>
      </div>
    </div>
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <p>YieldMind — AI-powered yield optimization on Initia. Built for the Initia Hackathon.</p>
  </footer>
  <script src="{{ url_for('static', filename='js/wallet-bridge.js', v='20260317m') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
